<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Humanizer</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Michroma&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="panel.css" />
</head>

<body>
  <div id="app">
    <header class="main-header">
      <div class="logo">
        <h1>Humanizer</h1>
      </div>
    </header>
    

    <main class="main-content">
      <div class="column input-column">
        <div class="tab-group" id="format-tabs">
          <button class="tab-btn active" data-value="regular">Regular</button>
          <button class="tab-btn" data-value="points">Points</button>
        </div>

        <div class="editor-container">
          <textarea id="input-area" placeholder="Paste AI-generated text here..."></textarea>
          <div class="editor-footer">
            <button id="insert-sample-btn" class="text-link">Insert Sample</button>
          </div>
        </div>

        <button id="humanize-btn" class="btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 4V2" />
            <path d="M15 16v-2" />
            <path d="M8 9h2" />
            <path d="M20 9h2" />
            <path d="M17.8 11.8 19 13" />
            <path d="M15 9h.01" />
            <path d="M17.8 6.2 19 5" />
            <path d="M3 21l9-9" />
            <path d="M12.2 6.2 11 5" />
          </svg>
          Humanize Text
        </button>
      </div>

      <div class="column output-column">
        <div class="tab-group" id="markdown-tabs">
          <button class="tab-btn active" data-value="unformatted">Unformatted</button>
          <button class="tab-btn" data-value="formatted">Formatted</button>
        </div>

        <div class="editor-container">
          <div id="output-area" class="output-preview" data-placeholder="Humanized text will appear here..."></div>
          <div class="editor-footer">
            <div id="score-indicator" class="hidden">
              <span class="score-label">Human Score:</span>
              <span id="score-value" class="score-badge">0</span>
            </div>
          </div>
        </div>

        <button id="copy-btn" class="btn-secondary" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
            <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
          </svg>
          Copy to Clipboard
        </button>
      </div>
    </main>


    <div id="toast" class="toast hidden"></div>
  </div>
  <script src="panel.js"></script>
</body>

</html>
