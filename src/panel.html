<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Humanizer</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="stylesheet" href="panel.css" />
</head>

<body>
  <div id="app">

    <div class="header">
      <div class="header-title">
        <img src="icon.svg" width="26" height="26" alt="" />
        <h1>Text Humanizer</h1>
      </div>
      <p class="subtitle">Paste AI-generated text, then click Humanize</p>
    </div>

    <div class="main-layout">
      <div class="left-column">
        <div class="section">
          <p class="hint" id="key-status-server" style="display:none;color:#15803d;font-weight:500"></p>
          <div id="key-section">
            <label>Groq API Key</label>
            <div class="input-row">
              <input type="password" id="api-key" placeholder="gsk_..." />
              <button class="btn-secondary" id="save-key-btn">Save</button>
            </div>
            <p class="hint" id="key-status"></p>
          </div>
        </div>

        <div class="section">
          <button class="btn-primary" id="humanize-btn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 4V2" />
              <path d="M15 16v-2" />
              <path d="M8 9h2" />
              <path d="M20 9h2" />
              <path d="M17.8 11.8 19 13" />
              <path d="M15 9h.01" />
              <path d="M17.8 6.2 19 5" />
              <path d="M3 21l9-9" />
              <path d="M12.2 6.2 11 5" />
            </svg>
            Humanize Text
          </button>
        </div>

        <div class="section">
          <label>Paste text to humanize</label>
          <textarea id="paste-area" rows="8" placeholder="Paste AI-generated text here..."></textarea>
        </div>

        <button class="btn-sample" id="insert-sample-btn">Insert sample AI text to test</button>
      </div>

      <div class="right-column">
        <div id="card-area"></div>
      </div>
    </div>

  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="panel.js"></script>
</body>

</html>
