<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Humanizer</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="stylesheet" href="panel.css" />
</head>

<body>
  <div id="app">
    <header class="main-header">
      <div class="logo">
        <img src="icon.svg" width="28" height="28" alt="" />
        <h1>Humanizer</h1>
      </div>
      <div class="header-actions">
        <button id="settings-btn" title="API Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path
              d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </button>
      </div>
    </header>

    <main class="main-content">
      <div class="column input-column">
        <div class="tab-group" id="format-tabs">
          <button class="tab-btn active" data-value="regular">Regular</button>
          <button class="tab-btn" data-value="points">Points</button>
        </div>

        <div class="editor-container">
          <textarea id="input-area" placeholder="Paste AI-generated text here..."></textarea>
          <div class="editor-footer">
            <button id="insert-sample-btn" class="text-link">Insert Sample</button>
          </div>
        </div>

        <button id="humanize-btn" class="btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 4V2" />
            <path d="M15 16v-2" />
            <path d="M8 9h2" />
            <path d="M20 9h2" />
            <path d="M17.8 11.8 19 13" />
            <path d="M15 9h.01" />
            <path d="M17.8 6.2 19 5" />
            <path d="M3 21l9-9" />
            <path d="M12.2 6.2 11 5" />
          </svg>
          Humanize Text
        </button>
      </div>

      <div class="column output-column">
        <div class="tab-group" id="markdown-tabs">
          <button class="tab-btn active" data-value="unformatted">Unformatted</button>
          <button class="tab-btn" data-value="formatted">Formatted</button>
        </div>

        <div class="editor-container">
          <div id="output-area" class="output-preview" data-placeholder="Humanized text will appear here..."></div>
          <div class="editor-footer">
            <div id="score-indicator" class="hidden">
              <span class="score-label">Human Score:</span>
              <span id="score-value" class="score-badge">0</span>
            </div>
          </div>
        </div>

        <button id="copy-btn" class="btn-secondary" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
            <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
          </svg>
          Copy to Clipboard
        </button>
      </div>
    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>API Settings</h2>
          <button id="close-settings" class="icon-btn">&times;</button>
        </div>
        <div class="modal-body">
          <p class="hint" id="key-status-server" style="display:none"></p>
          <div id="key-section">
            <label for="api-key">Groq API Key</label>
            <div class="input-row">
              <input type="password" id="api-key" placeholder="gsk_..." />
              <button id="save-key-btn" class="btn-primary">Save</button>
            </div>
            <p class="hint" id="key-status">Your key is stored locally in your browser.</p>
          </div>
        </div>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>
  </div>
  <script src="panel.js"></script>
</body>

</html>
