<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#15803d"/>
  <!-- Pen nib writing a spark/wave — "humanizing" idea -->
  <!-- Pencil body -->
  <rect x="28" y="10" width="8" height="28" rx="3" fill="white" opacity="0.95"/>
  <!-- Pencil tip -->
  <polygon points="28,38 36,38 32,46" fill="#bbf7d0"/>
  <!-- Pencil eraser top -->
  <rect x="28" y="10" width="8" height="5" rx="2" fill="#86efac"/>
  <!-- Sparkle dots — the "humanizing" magic -->
  <circle cx="46" cy="22" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="50" cy="30" r="1.8" fill="white" opacity="0.6"/>
  <circle cx="44" cy="36" r="1.4" fill="white" opacity="0.45"/>
  <!-- Small star/asterisk spark -->
  <g transform="translate(46,18)" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.8">
    <line x1="0" y1="-4" x2="0" y2="4"/>
    <line x1="-4" y1="0" x2="4" y2="0"/>
    <line x1="-2.8" y1="-2.8" x2="2.8" y2="2.8"/>
    <line x1="2.8" y1="-2.8" x2="-2.8" y2="2.8"/>
  </g>
</svg>

